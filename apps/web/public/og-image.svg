<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Open Jigsaw Puzzle">
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#111111" flood-opacity="0.12"/>
    </filter>
    <path id="piece" d="M0 0h190v70c28 0 44 15 44 36s-16 36-44 36v70h-70c0 28-15 44-36 44s-36-16-36-44H0v-70c28 0 44-15 44-36S28 70 0 70Z"/>
  </defs>

  <rect width="1200" height="630" fill="#f7f4ed"/>
  <rect width="1200" height="630" fill="#f7f4ed" filter="url(#paper)"/>

  <g transform="translate(84 118)">
    <text x="0" y="82" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="94" font-weight="400">Open</text>
    <text x="0" y="184" fill="#111111" font-family="Inter, Helvetica, Arial, sans-serif" font-size="86" font-weight="500">Jigsaw Puzzle</text>
    <rect x="4" y="232" width="112" height="5" rx="2.5" fill="#3f8f8a"/>
    <rect x="116" y="232" width="112" height="5" rx="2.5" fill="#ef6f5e"/>
    <text x="0" y="312" fill="#202020" font-family="'Hiragino Sans', 'Noto Sans CJK JP', 'Yu Gothic', sans-serif" font-size="34" font-weight="600">みんなで一緒にパズルを楽しもう</text>
  </g>

  <g transform="translate(722 -54)" filter="url(#softShadow)">
    <use href="#piece" x="36" y="0" fill="#3f8f8a" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
    <use href="#piece" x="-42" y="212" fill="#f7f4ed" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
    <use href="#piece" x="234" y="212" fill="#f7f4ed" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
    <use href="#piece" x="36" y="424" fill="#ef6f5e" stroke="#111111" stroke-width="5" stroke-linejoin="round"/>
  </g>
</svg>
