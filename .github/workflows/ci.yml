name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Worker bundle
        env:
          OPEN_JIGSAW_PUZZLE_D1_DATABASE_ID: 00000000-0000-4000-8000-000000000000
        run: |
          pnpm --filter @open-jigsaw-puzzle/api prepare:wrangler
          pnpm --filter @open-jigsaw-puzzle/api exec wrangler deploy --dry-run --outdir dist/worker --config wrangler.generated.jsonc

      - name: Upload preview bundle
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: preview-bundle
          if-no-files-found: error
          retention-days: 3
          path: |
            apps/api/dist/worker/index.js
            apps/api/dist/worker/index.js.map
            apps/api/migrations/**
            apps/web/dist/**

      - name: Upload production bundle
        if: >-
          ${{
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
          }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-bundle
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/api/dist/worker/index.js
            apps/api/dist/worker/index.js.map
            apps/api/migrations/**
            apps/web/dist/**
