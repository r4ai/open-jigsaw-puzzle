name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Worker bundle
        env:
          OPEN_JIGSAW_PUZZLE_D1_DATABASE_ID: 00000000-0000-4000-8000-000000000000
        run: |
          pnpm --filter @open-jigsaw-puzzle/api prepare:wrangler
          pnpm --filter @open-jigsaw-puzzle/api exec wrangler deploy --dry-run --outdir dist/worker --config wrangler.generated.jsonc

      - name: Upload preview bundle
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-bundle
          if-no-files-found: error
          retention-days: 3
          path: |
            apps/api/dist/worker/index.js
            apps/api/dist/worker/index.js.map
            apps/api/migrations/**
            apps/web/dist/**

      - name: Upload production bundle
        if: >-
          ${{
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
          }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-bundle
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/api/dist/worker/index.js
            apps/api/dist/worker/index.js.map
            apps/api/migrations/**
            apps/web/dist/**
