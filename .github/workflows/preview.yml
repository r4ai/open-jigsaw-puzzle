name: Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy PR preview
    if: >-
      ${{
        github.event.action != 'closed' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PREVIEW_DOMAIN_SUFFIX: ${{ vars.CLOUDFLARE_PREVIEW_DOMAIN_SUFFIX }}
      PREVIEW_NAME: open-jigsaw-puzzle-pr-${{ github.event.pull_request.number }}
      PREVIEW_HOST: pr-${{ github.event.pull_request.number }}.${{ vars.CLOUDFLARE_PREVIEW_DOMAIN_SUFFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$PREVIEW_DOMAIN_SUFFIX"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Ensure preview D1 database
        id: d1
        working-directory: apps/api
        run: pnpm exec node scripts/ensure-preview-d1.mjs "$PREVIEW_NAME"

      - name: Prepare preview Wrangler config
        env:
          OPEN_JIGSAW_PUZZLE_WORKER_NAME: ${{ env.PREVIEW_NAME }}
          OPEN_JIGSAW_PUZZLE_D1_DATABASE_NAME: ${{ env.PREVIEW_NAME }}
          OPEN_JIGSAW_PUZZLE_D1_DATABASE_ID: ${{ steps.d1.outputs.database_id }}
          OPEN_JIGSAW_PUZZLE_CUSTOM_DOMAIN_HOST: ${{ env.PREVIEW_HOST }}
        run: pnpm --filter @open-jigsaw-puzzle/api run prepare:wrangler

      - name: Apply preview D1 migrations
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply "$PREVIEW_NAME" --remote --config wrangler.generated.jsonc

      - name: Deploy preview Worker
        working-directory: apps/api
        run: pnpm exec wrangler deploy --config wrangler.generated.jsonc

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ env.PREVIEW_HOST }}
          PREVIEW_NAME: ${{ env.PREVIEW_NAME }}
          PREVIEW_HOST: ${{ env.PREVIEW_HOST }}
        with:
          script: |
            const marker = '<!-- open-puzzle-preview -->';
            const body = [
              marker,
              '## Preview environment',
              '',
              `Deployed: ${process.env.PREVIEW_URL}`,
              '',
              `Host: \`${process.env.PREVIEW_HOST}\``,
              `Worker: \`${process.env.PREVIEW_NAME}\``,
              `D1: \`${process.env.PREVIEW_NAME}\``,
              `Commit: \`${context.payload.pull_request.head.sha}\``,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  cleanup:
    name: Cleanup PR preview
    if: >-
      ${{
        github.event.action == 'closed' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PREVIEW_NAME: open-jigsaw-puzzle-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Delete preview resources
        run: |
          run_cleanup() {
            label="$1"
            shift
            set +e
            output="$("$@" 2>&1)"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              printf '%s\n' "$output"
              return 0
            fi
            if printf '%s\n' "$output" | grep -Eiq 'not found|could not find|does not exist|couldn'\''t find'; then
              echo "$label was already absent."
              return 0
            fi
            printf '%s\n' "$output"
            return "$status"
          }

          run_cleanup "Preview Worker" pnpm --filter @open-jigsaw-puzzle/api exec wrangler delete "$PREVIEW_NAME" --force
          run_cleanup "Preview D1 database" pnpm --filter @open-jigsaw-puzzle/api exec wrangler d1 delete "$PREVIEW_NAME" --skip-confirmation

      - name: Comment cleanup result
        uses: actions/github-script@v7
        env:
          PREVIEW_NAME: ${{ env.PREVIEW_NAME }}
        with:
          script: |
            const marker = '<!-- open-puzzle-preview -->';
            const body = [
              marker,
              '## Preview environment',
              '',
              `Cleaned up preview resources for \`${process.env.PREVIEW_NAME}\`.`,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
